<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <title>GESTION DU PROJET</title>
  <desc>Construction project management logo</desc>

  <!-- Background -->
  <rect width="600" height="280" rx="16" fill="#1a1a2e"/>
  <rect width="6" height="280" rx="3" fill="#4f46e5"/>

  <!-- Crane tower -->
  <rect x="60" y="60" width="12" height="160" rx="2" fill="#4f46e5"/>
  <!-- Boom -->
  <rect x="40" y="60" width="130" height="10" rx="2" fill="#4f46e5"/>
  <!-- Counter arm -->
  <rect x="32" y="52" width="18" height="24" rx="3" fill="#6366f1"/>
  <!-- Cable -->
  <line x1="170" y1="70" x2="170" y2="135" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Hook -->
  <path d="M165 135 Q165 145 175 145 Q180 145 180 140" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <!-- Trolley -->
  <rect x="163" y="65" width="14" height="8" rx="2" fill="#10b981"/>

  <!-- Building floors -->
  <rect x="90" y="198" width="80" height="22" rx="3" fill="#4f46e5" opacity="0.9"/>
  <rect x="93" y="176" width="74" height="22" rx="3" fill="#4f46e5" opacity="0.75"/>
  <rect x="96" y="154" width="60" height="22" rx="3" fill="#4f46e5" opacity="0.5"/>
  <!-- Windows -->
  <rect x="101" y="202" width="10" height="12" rx="1" fill="#1a1a2e" opacity="0.6"/>
  <rect x="118" y="202" width="10" height="12" rx="1" fill="#1a1a2e" opacity="0.6"/>
  <rect x="135" y="202" width="10" height="12" rx="1" fill="#10b981" opacity="0.7"/>
  <!-- Ground line -->
  <line x1="48" y1="220" x2="185" y2="220" stroke="#334155" stroke-width="1.5"/>
  <!-- Progress bar -->
  <rect x="48" y="228" width="137" height="5" rx="3" fill="#334155"/>
  <rect x="48" y="228" width="90" height="5" rx="3" fill="#10b981"/>

  <!-- Typography -->
  <text x="230" y="98" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="2">GESTION</text>
  <text x="230" y="136" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="4">DU PROJET</text>
  <line x1="230" y1="148" x2="570" y2="148" stroke="#334155" stroke-width="1"/>
  <text x="230" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="1.5">Suivi · Ressources · Avancement</text>

  <!-- Pills -->
  <rect x="230" y="192" width="82" height="24" rx="12" fill="#1e293b"/>
  <circle cx="244" cy="204" r="5" fill="#10b981"/>
  <text x="253" y="208" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Employés</text>

  <rect x="320" y="192" width="76" height="24" rx="12" fill="#1e293b"/>
  <circle cx="334" cy="204" r="5" fill="#4f46e5"/>
  <text x="343" y="208" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Matériaux</text>

  <rect x="403" y="192" width="68" height="24" rx="12" fill="#1e293b"/>
  <circle cx="417" cy="204" r="5" fill="#f59e0b"/>
  <text x="426" y="208" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Phases</text>

  <rect x="478" y="192" width="66" height="24" rx="12" fill="#1e293b"/>
  <circle cx="492" cy="204" r="5" fill="#ef4444"/>
  <text x="501" y="208" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#94a3b8">Contrat</text>

  <text x="562" y="248" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="end">v2.0</text>
</svg>
